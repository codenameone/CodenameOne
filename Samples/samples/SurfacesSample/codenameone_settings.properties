#Surfaces sample build hints
# Periodic widget refresh rides on background fetch; iOS requires the fetch background mode
# for Display.setPreferredBackgroundFetchInterval / performBackgroundFetch to run on device.
codename1.arg.ios.background_modes=fetch
# The iOS widget extension and the app share published timelines through an App Group.
# It defaults to group.<packageName>; uncomment to override (surfaces.json appGroup wins).
#codename1.arg.ios.surfaces.appGroup=group.com.codename1.samples
# Timeline entry flips use inexact alarms on Android by default (countdowns still tick
# natively every second via Chronometer). Uncomment for exact flips (needs user consent
# on Android 12+).
#codename1.arg.android.surfaces.exactAlarms=true
