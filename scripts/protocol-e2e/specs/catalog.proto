syntax = "proto3";

package e2e;

// Contract for the gRPC-Web transport. Covers an enum field, a repeated
// scalar field, nested/repeated messages, and multiple rpc methods so the
// generated CN1 protobuf codecs are genuinely exercised.

enum Category {
    CATEGORY_UNSPECIFIED = 0;
    BOOKS = 1;
    ELECTRONICS = 2;
    TOYS = 3;
}

message Product {
    int64 id = 1;
    string name = 2;
    Category category = 3;
    repeated string tags = 4;
    double rating = 5;
}

message GetProductRequest {
    int64 id = 1;
}

message ListProductsRequest {
    Category category = 1;
}

message ProductList {
    repeated Product products = 1;
}

service Catalog {
    rpc GetProduct (GetProductRequest) returns (Product);
    rpc ListProducts (ListProductsRequest) returns (ProductList);
}
