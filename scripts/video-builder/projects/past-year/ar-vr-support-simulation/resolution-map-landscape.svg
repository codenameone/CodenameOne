<style>.p{font:700 28px sans-serif;fill:#ffc857}.s{font:700 28px sans-serif;fill:#50d8ff}.d{font:24px sans-serif;fill:#cbd5e1}.r{fill:#171c26;stroke:#34445d;stroke-width:3;rx:16}</style>
