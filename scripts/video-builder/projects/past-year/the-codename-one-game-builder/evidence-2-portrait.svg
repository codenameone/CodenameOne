<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1180"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071427"/><stop offset="1" stop-color="#12334a"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="10"/></filter></defs><rect width="800" height="1180" rx="34" fill="url(#bg)"/><rect x="56.00000000000001" y="141.6" width="688.0" height="873.2" rx="32" fill="#111d2d" stroke="#ffad57" stroke-width="5"/><text x="400" y="247" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#ffad57">INDEPENDENT CONTEXT</text><text x="400" y="401" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="#f4f8fb">Map editors preserve</text><text x="400" y="457" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="#f4f8fb">layers, objects, and</text><text x="400" y="513" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="#f4f8fb">properties</text><text x="400" y="649" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">Tiled exports visual maps with</text><text x="400" y="689" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">layers, object data, tile sets,</text><text x="400" y="729" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">and custom properties that</text><text x="400" y="769" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">runtimes can load independently of</text><text x="400" y="809" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">editor code.</text><text x="400" y="944" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#ffad57">Tiled JSON Map Format</text></svg>
