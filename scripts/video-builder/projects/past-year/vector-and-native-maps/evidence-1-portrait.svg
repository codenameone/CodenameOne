<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1180"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071427"/><stop offset="1" stop-color="#12334a"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="10"/></filter></defs><rect width="800" height="1180" rx="34" fill="url(#bg)"/><rect x="56.00000000000001" y="141.6" width="688.0" height="873.2" rx="32" fill="#111d2d" stroke="#50d8ff" stroke-width="5"/><text x="400" y="247" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#50d8ff">INDEPENDENT CONTEXT</text><text x="400" y="401" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="#f4f8fb">Vector tiles separate</text><text x="400" y="457" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="#f4f8fb">compact data from</text><text x="400" y="513" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="#f4f8fb">rendering</text><text x="400" y="649" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">The vector-tile specification</text><text x="400" y="689" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">encodes tiled geometry and</text><text x="400" y="729" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">attributes so clients can choose</text><text x="400" y="769" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">how roads, water, labels, and</text><text x="400" y="809" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" font-weight="400" fill="#c5dcea">boundaries are drawn.</text><text x="400" y="944" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#50d8ff">Mapbox Vector Tile</text><text x="400" y="978" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#50d8ff">Specification</text></svg>
