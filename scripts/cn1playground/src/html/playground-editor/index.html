<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CN1 Playground Editor</title>
  <style>
    html, body, #editor {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }
    body {
      font-family: Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    .playground-zone {
      box-sizing: border-box;
      padding: 8px 12px 10px;
      border-top: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(241, 245, 249, 0.95);
      font: 12px/1.45 Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      color: #0f172a;
    }
    .playground-zone.dark {
      background: rgba(15, 23, 42, 0.92);
      color: #e2e8f0;
      border-top-color: rgba(148, 163, 184, 0.2);
    }
    .playground-zone-row {
      margin-top: 4px;
    }
    .playground-zone-row:first-child {
      margin-top: 0;
    }
    .playground-zone-row.kind-error { color: #b91c1c; }
    .playground-zone-row.kind-warning { color: #b45309; }
    .playground-zone-row.kind-success { color: #047857; }
    .playground-zone.dark .playground-zone-row.kind-error { color: #fca5a5; }
    .playground-zone.dark .playground-zone-row.kind-warning { color: #fcd34d; }
    .playground-zone.dark .playground-zone-row.kind-success { color: #6ee7b7; }
  </style>
</head>
<body>
  <div id="editor"></div>
  <script src="monaco/min/vs/loader.js"></script>
  <script src="editor.js"></script>
</body>
</html>
