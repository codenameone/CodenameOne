<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CN1 Playground Editor</title>
  <style>
    html, body, #editor {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #F7F8FB;
    }
    body {
      font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .playground-zone {
      box-sizing: border-box;
      padding: 8px 12px 10px;
      border-top: 1px solid #D9DEE8;
      background: #FAFAFC;
      font: 12px/1.45 Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      color: #112247;
    }
    .playground-zone.dark {
      background: #112F70;
      color: #F5F8FF;
      border-top-color: #4C6EA8;
    }
    .playground-zone-row {
      margin-top: 4px;
    }
    .playground-zone-row:first-child {
      margin-top: 0;
    }
    .playground-zone-row.kind-error { color: #B42318; }
    .playground-zone-row.kind-warning { color: #B54708; }
    .playground-zone-row.kind-success { color: #2F6BFF; }
    .playground-zone.dark .playground-zone-row.kind-error { color: #FDB0AC; }
    .playground-zone.dark .playground-zone-row.kind-warning { color: #F7B27A; }
    .playground-zone.dark .playground-zone-row.kind-success { color: #4D86FF; }
  </style>
</head>
<body>
  <div id="editor"></div>
  <script src="monaco/min/vs/loader.js"></script>
  <script src="editor.js"></script>
</body>
</html>
