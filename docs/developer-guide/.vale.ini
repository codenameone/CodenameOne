StylesPath = styles
MinAlertLevel = suggestion
Vocab = CodenameOne
Packages = https://github.com/errata-ai/packages/releases/download/v0.2.0/Microsoft.zip, https://github.com/errata-ai/packages/releases/download/v0.2.0/proselint.zip, https://github.com/errata-ai/packages/releases/download/v0.2.0/write-good.zip

# How to suppress vale on a specific line
# ─────────────────────────────────────────────────────────────────────────────
# Place an asciidoc comment of the form:
#
#     // vale-skip: <rule-name>: <reason for the exception>
#     The next line of content that vale will ignore.
#
# Example:
#
#     // vale-skip: Microsoft.ComplexWords: 'Approximate' is the correct technical
#     // term here; substituting 'about' loses precision.
#     |Approximate fade duration is `durationMs ~= (255 / speed)`...
#
# Notes:
# - The comment must appear on the line immediately preceding the content. It
#   protects exactly the next non-empty line.
# - Asciidoctor strips // comments from rendered HTML and PDF output, so the
#   comment never appears to readers — only in the source as documentation.
# - The TokenIgnores pattern below matches against asciidoc source, so it works
#   inside paragraph text, table cells, list items, and admonition blocks.
# - This skips ALL vale rules for the protected line. Specify the rule name
#   and reason in the comment so future maintainers understand the exception.
# - For longer/multi-line exceptions, place a // vale-skip comment before each
#   line that needs protection.
# ─────────────────────────────────────────────────────────────────────────────

# Rules disabled with documented rationale
# ─────────────────────────────────────────────────────────────────────────────
# The default Microsoft / proselint / write-good styles target product UX copy
# and customer support content. Several rules misfire systematically against a
# 3,000-page developer guide written in a tutorial / reference voice. Each rule
# below is disabled with the reason it does not apply here. Anything not listed
# stays enabled and is treated as a build-breaking warning.
#
# - write-good.Passive / Microsoft.Passive: Passive constructions ("the value
#   is set automatically", "the bytecode is translated to C") are routinely the
#   clearest way to describe what the framework does to the developer's code.
#   Forcing active voice would force us to invent an actor.
# - write-good.Weasel: Flags ordinary quantifiers like "few", "many", "only"
#   that legitimately describe optionality and frequency in API behavior.
# - write-good.TooWordy: Flags neutral technical vocabulary ("additional",
#   "equivalent", "exclusively") that has no shorter precise synonym.
# - write-good.E-Prime: Bans the verb "to be" entirely; impractical for any
#   reference document.
# - write-good.ThereIs / write-good.So: Banning sentence openers like
#   "There is..." or "So..." removes natural transitions in tutorial prose.
# - write-good.Illusions: Flags adjacent repeated tokens. We rely on this
#   rule, but it produces false positives on product names like "IntelliJ
#   IDEA" followed by "IDE" (rendered as "IDEA IDE"). Real duplications are
#   caught case-by-case in review.
# - Microsoft.FirstPerson / Microsoft.We: The guide is written by named
#   maintainers in a conversational voice; "I", "we", and "let's" are
#   intentional.
# - Microsoft.HeadingAcronyms: Acronyms (UI, API, PSD, IDE, CSS, JSON) are the
#   primary nouns for the components this guide documents and must appear in
#   their section titles.
# - Microsoft.GeneralURL: "URL" is the precise term for an audience of
#   developers wiring up HTTP requests; "address" would be ambiguous with
#   memory and IP addresses elsewhere in the same chapters.
# - Microsoft.Adverbs: Microsoft style asks us to drop softeners ("nicely",
#   "rigidly"); they read as authorial voice in a developer guide and removing
#   each one mechanically degrades the prose without improving clarity.
# - Microsoft.Ranges / Microsoft.RangeFormat: Numeric ranges in this guide are
#   either color channels ("0-255"), ISO codes ("ISO 639-1", "ISO 3166-1") or
#   error codes — converting them to "from X through Y" or en dashes changes
#   their meaning or breaks lookup against the upstream standard.
# - Microsoft.Terms: Microsoft prefers "cloud" over "the cloud" and "phone"
#   over "smartphone"; neither swap is idiomatic in mobile-developer prose.
# - Microsoft.Wordiness: Flags neutral phrases like "in order to" that are
#   often the clearer reading in long technical sentences.
# - Microsoft.Contractions: Microsoft style wants every "is not" rewritten as
#   "isn't". The guide has a mixed register intentionally — formal in
#   reference sections, friendlier in tutorials — and enforcing one rewrite
#   direction across both registers reduces readability.
# - Microsoft.Units: Fires on phrases like "expressed in millimeters" where no
#   numeral is present; the rule assumes adjacency to a number.
# - Microsoft.Auto: Modern Microsoft style writes "autogenerated", but this
#   guide pre-dates that convention and changing every "auto-generated" /
#   "auto-detected" across the corpus produces churn in code-adjacent prose
#   (build hints, attribute names) where the hyphen is part of the identifier.
# - Microsoft.Negative: Wants en dashes for negative numbers; would corrupt
#   code references like `-1`, `--add-exports`, and `setX(-1)`.
# - Microsoft.Dashes: Microsoft style wants em dashes flush against the
#   adjoining words. The guide uses two conventions intentionally — spaced em
#   dashes in prose ("foo — bar — baz") for legibility at the column widths we
#   render at, and spaced en dashes in bullet lists ("* Heading – body") for
#   the leader / follower pattern. Both are standard in long-form technical
#   writing; mechanically removing the spaces would either crash an em dash
#   against bold markup or destroy the bullet rhythm.
# - Microsoft.Spacing: Fires inside dotted identifiers
#   ("Manifest.permission", "e.g.", "androidx.activity.ComponentActivity")
#   because the rule cannot tell code references from prose sentences.
# - Microsoft.Avoid: Flags "backend" as deprecated terminology; "backend" is
#   the standard term across mobile development and the guide uses it
#   throughout.
# - Microsoft.Percentages: Triggers on word forms like "few percent"; the
#   numeral-plus-unit rewrite does not apply when no numeral is present.
# - proselint.Needless: Flags "Lollipop" as a misspelling of "lollypop"; in
#   this guide every instance refers to the Android 5.0 platform codename.
# - proselint.Skunked: Flags transitional words like "Hopefully" and
#   "Thankfully"; both are used as authorial voice in tutorial chapters and
#   their disputed-usage status is not a defect of this document.
# - Microsoft.ComplexWords: Suggests replacing "component", "additional",
#   "equivalent", and similar neutral terms with shorter synonyms. In a
#   developer-facing reference, "component" is the name of a class
#   (`Component`); the rule cannot tell a class noun from prose.
# - Microsoft.Acronyms: Requires every acronym to have a definition in the
#   same document. UI, API, JSON, HTTP, REST, SDK, JDK, JVM, IDE, CSS, RPC,
#   PSD, UIID and dozens of others appear throughout; expanding each one
#   would inflate the guide for readers who already know the term.
# - Microsoft.Vocab: Flags ordinary English verbs ("allows", "author",
#   "leverage") that have no defect on their own — they fail only against the
#   internal Microsoft A-Z word list, which is not a style we adopt.
# - Microsoft.SentenceLength: Caps sentences at 30 words. Long sentences are
#   sometimes the clearest way to thread a multi-clause technical
#   explanation; the rule produces 360 hits across well-formed paragraphs.
# - Microsoft.Headings: Enforces sentence-style capitalization, which the
#   guide does follow — but the check trips on headings that embed a code
#   identifier ("AndroidNativeUtil's checkForPermission", "The camera
#   Button") because it cannot tell which capitalized tokens are class /
#   method names that must stay capitalized.
# - Microsoft.Semicolon: Suggests rewriting any sentence containing a
#   semicolon. Semicolons are appropriate for joining related independent
#   clauses in technical exposition.
# - Microsoft.Accessibility: Flags "disabled" and "normal" as bias language.
#   Both are documented UI states / API constants ("disabled" button,
#   "normal" priority); they refer to widget state, not to people.
# - Microsoft.OxfordComma: Codename One docs do not require the Oxford comma
#   uniformly; only one finding total and it occurs inside a list whose
#   omission is intentional.

[*.{adoc,asciidoc}]
BasedOnStyles = Microsoft, proselint, write-good
TokenIgnores = (?s)// vale-skip:[^\n]*\n[^\n]+\n

write-good.Passive = NO
Microsoft.Passive = NO
write-good.Weasel = NO
write-good.TooWordy = NO
write-good.E-Prime = NO
write-good.ThereIs = NO
write-good.So = NO
write-good.Illusions = NO
Microsoft.FirstPerson = NO
Microsoft.We = NO
Microsoft.HeadingAcronyms = NO
Microsoft.GeneralURL = NO
Microsoft.Adverbs = NO
Microsoft.Ranges = NO
Microsoft.RangeFormat = NO
Microsoft.Terms = NO
Microsoft.Wordiness = NO
Microsoft.Contractions = NO
Microsoft.Units = NO
Microsoft.Auto = NO
Microsoft.Negative = NO
Microsoft.Dashes = NO
Microsoft.Spacing = NO
Microsoft.Avoid = NO
Microsoft.Percentages = NO
proselint.Needless = NO
proselint.Skunked = NO
Microsoft.ComplexWords = NO
Microsoft.Acronyms = NO
Microsoft.Vocab = NO
Microsoft.SentenceLength = NO
Microsoft.Headings = NO
Microsoft.Semicolon = NO
Microsoft.Accessibility = NO
Microsoft.OxfordComma = NO
