<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" width="360" height="640" role="img" aria-label="ChatView mockup">
  <title>ChatView mockup</title>
  <desc>Mockup of the com.codename1.components.ChatView component showing a system bubble, two user bubbles, two assistant bubbles, a typing indicator, and the ChatInput strip with attach, text field, voice, and send buttons.</desc>

  <!-- Phone background -->
  <rect x="0" y="0" width="360" height="640" fill="#0f172a"/>

  <!-- Status / title bar -->
  <rect x="0" y="0" width="360" height="56" fill="#1e293b"/>
  <text x="20" y="35" font-family="-apple-system, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0">Assistant</text>
  <text x="340" y="35" text-anchor="end" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" fill="#94a3b8">14:32</text>

  <!-- Messages area -->
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="14" fill="#0f172a">

    <!-- System bubble -->
    <rect x="80" y="74" width="200" height="32" rx="16" fill="#334155"/>
    <text x="180" y="95" text-anchor="middle" fill="#cbd5f5">Session started</text>

    <!-- User bubble 1 -->
    <rect x="120" y="120" width="220" height="44" rx="16" fill="#1d4ed8"/>
    <text x="135" y="148" fill="#ffffff">Translate "good morning" to French</text>

    <!-- Assistant bubble 1 -->
    <rect x="20" y="180" width="180" height="44" rx="16" fill="#e2e8f0"/>
    <text x="35" y="208">"Bonjour" (literally "good day").</text>

    <!-- User bubble 2 -->
    <rect x="120" y="240" width="220" height="64" rx="16" fill="#1d4ed8"/>
    <text x="135" y="266" fill="#ffffff">Now read it out and</text>
    <text x="135" y="286" fill="#ffffff">show me an image.</text>

    <!-- Assistant bubble 2 with streaming text -->
    <rect x="20" y="320" width="240" height="84" rx="16" fill="#e2e8f0"/>
    <text x="35" y="346">Sure. Streaming an image now</text>
    <text x="35" y="366">and speaking the translation</text>
    <text x="35" y="386">via TextToSpeech.speak(...).</text>

    <!-- Typing indicator (three dots) -->
    <rect x="20" y="420" width="64" height="32" rx="16" fill="#e2e8f0"/>
    <circle cx="36" cy="436" r="4" fill="#475569"/>
    <circle cx="52" cy="436" r="4" fill="#64748b"/>
    <circle cx="68" cy="436" r="4" fill="#94a3b8"/>
  </g>

  <!-- Input strip -->
  <rect x="0" y="560" width="360" height="80" fill="#1e293b"/>
  <line x1="0" y1="560" x2="360" y2="560" stroke="#334155" stroke-width="1"/>

  <!-- Attach button -->
  <circle cx="28" cy="600" r="18" fill="#334155"/>
  <text x="28" y="606" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" fill="#e2e8f0">+</text>

  <!-- Text field -->
  <rect x="56" y="582" width="208" height="36" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="70" y="606" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" fill="#64748b">Message</text>

  <!-- Voice button -->
  <circle cx="284" cy="600" r="18" fill="#334155"/>
  <rect x="280" y="592" width="8" height="12" rx="4" fill="#e2e8f0"/>
  <rect x="280" y="608" width="8" height="2" fill="#e2e8f0"/>

  <!-- Send button -->
  <circle cx="324" cy="600" r="18" fill="#1d4ed8"/>
  <polygon points="318,592 334,600 318,608" fill="#ffffff"/>
</svg>
