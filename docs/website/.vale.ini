StylesPath = styles
MinAlertLevel = suggestion
Vocab = CodenameOne
Packages = https://github.com/errata-ai/packages/releases/download/v0.2.0/Microsoft.zip, https://github.com/errata-ai/packages/releases/download/v0.2.0/proselint.zip, https://github.com/errata-ai/packages/releases/download/v0.2.0/write-good.zip

# Blog prose linting (Hugo Markdown) — companion to docs/developer-guide/.vale.ini.
# ─────────────────────────────────────────────────────────────────────────────
# This config lints the Markdown blog posts under docs/website/content/blog. It
# reuses the developer guide's rule set and CodenameOne vocabulary so the two
# bodies of prose are held to the same standard. The differences from the guide
# config are entirely about FORMAT (Markdown + Hugo, not AsciiDoc):
#
#   * BasedOnStyles, the disabled rules, and the CodenameOne vocab are identical
#     to the guide so a term accepted in one place is accepted in the other.
#   * Front matter and Hugo shortcodes are Markdown/Hugo constructs that are not
#     prose; they are stripped via BlockIgnores / TokenIgnores below.
#   * Vale's Markdown scanner already skips fenced code blocks and inline code
#     spans, so no extra handling is needed for those (unlike the AsciiDoc
#     tokenizer, which is why the guide leans on // vale-skip comments more).
#
# How to suppress vale on a specific line
# ─────────────────────────────────────────────────────────────────────────────
# Place an HTML comment of the form on the line immediately before the content:
#
#     <!-- vale-skip: <rule-name>: <reason for the exception> -->
#     The next line of content that vale will ignore.
#
# Notes:
# - The comment protects exactly the next non-empty line.
# - Hugo/Goldmark render HTML comments to nothing, so readers never see it — it
#   only documents the exception in source.
# - Disabling a rule wholesale (below) should be a last resort. Individual false
#   positives are better handled with a // term in the CodenameOne vocab
#   (styles/config/vocabularies/CodenameOne/accept.txt) or a vale-skip comment so
#   the rule keeps catching real defects elsewhere.
# ─────────────────────────────────────────────────────────────────────────────
#
# Rule disables. Each entry mirrors the developer guide's reasoning — the
# recommendation is wrong for technical writing, or fires on code/identifiers
# rather than prose — not merely noisy. See docs/developer-guide/.vale.ini for
# the long-form justification of each; the summary applies equally to the blog.
#
# write-good.Passive / Microsoft.Passive   passive voice is correct in technical prose
# write-good.E-Prime                        banning "to be" is unusable for prose that defines things
# write-good.Weasel                         "few"/"many"/"some" are ordinary quantifiers here
# write-good.TooWordy                       "additional"/"equivalent" have no exact shorter synonym
# write-good.ThereIs                        existential "There are…" is the natural construction
# Microsoft.GeneralURL                      "URL" is the term developers use, not "address"
# Microsoft.HeadingAcronyms                 API/UI/JSON/CSS are the nouns headings must use
# Microsoft.Terms                           Microsoft's substitution table is consumer copy
# Microsoft.ComplexWords                    flags "component", which is the class name Component
# Microsoft.Acronyms                        posts use 100+ acronyms read non-linearly
# Microsoft.Vocab                           only ever says "verify with the A-Z list"
# Microsoft.Headings                        cannot tell code identifiers/proper nouns from prose
# Microsoft.SentenceLength                  30-word cap is too coarse for API descriptions
# Microsoft.Ranges / Microsoft.RangeFormat  flagged "ranges" are ISO IDs / 0-255 channel values
# Microsoft.Negative                        flagged "-1" are documented sentinel return values
# Microsoft.Dashes                          spaced em/en dashes are a deliberate editorial choice
# Microsoft.Spacing                         fires on dotted identifiers like android.permission.X
# Microsoft.Units                           fires on "in millimeters" with no adjacent numeral
# Microsoft.Accessibility                   "disabled"/"normal" are documented UI states here
# Microsoft.Semicolon                       blanket "simplify this" on every semicolon
#
# Blog-specific disables (NOT in the developer guide). A whole-corpus run over
# the 854 posts produced ~37k findings, of which ~36k come from the rules below.
# Unlike the guide — a formal reference manual — the blog is deliberately
# personal and conversational (Shai writing in the first person, "we shipped",
# "this is very cool"). Enforcing Microsoft's reference-doc *voice* on it would
# not raise quality; it would sand off the tone that makes the blog the blog.
# These are register/format rules, not defect detectors, so they are disabled
# here while the real defect catchers (write-good.Illusions doubled-word check,
# Microsoft.Quotes, proselint.Typography, CodenameOneRules, gender-bias, …) stay
# on. LanguageTool remains the primary grammar/spelling check for the blog.
#
# Voice / register — intentional for a personal blog:
#   Microsoft.We            11173 hits — "we/our/us"; the blog's narrative voice
#   Microsoft.FirstPerson    7903 hits — "I/me/my"; the posts are first-person
#   Microsoft.Contractions   3247 hits — nudges "that's" for "that is" (and back)
#   Microsoft.Adverbs        2913 hits — flags "very", "deliberately", etc.
#   Microsoft.Wordiness       800 hits — "in order to", "all of" (cf. TooWordy)
#   Microsoft.Auto             72 hits — "auto-" register preference
#   proselint.Very            940 hits — "very" intensifier
#   proselint.Skunked         138 hits — disputed-usage words
#   proselint.Cliches /        —  hits — cliché/hyperbole flagged as register;
#   proselint.Hyperbole               a blog legitimately uses emphatic phrasing
#   proselint.But              75 hits — sentence-initial "But"
#   proselint.CorporateSpeak   11 hits
#   write-good.So             576 hits — sentence-initial "So"
#   write-good.Cliches         93 hits
#
# Date / time / heading FORMAT noise — fires on migrated text, not real prose:
#   Microsoft.AMPM           3149 hits — matches "49 am"/"56 pm" timestamp shards
#   proselint.DateCase       3147 hits — same timestamp shards
#   Microsoft.HeadingPunctuation 1045 hits — false headings ("e.", "m. ", "w.")
#   Microsoft.Foreign         826 hits — "e.g."/"i.e." (guide tolerates these too)
#   Microsoft.DateOrder /      —  hits — historical DD/MM/YYYY dates we keep as-is
#   Microsoft.DateMidnight /
#   proselint.DateMidnight
#   Microsoft.Ellipses /
#   Microsoft.HeadingColons          heading-format preferences

[formats]
# Treat HTML files the same as Markdown if any slip into the content tree.
html = md

[*.md]
BasedOnStyles = Microsoft, proselint, write-good, CodenameOneRules

# Strip the leading YAML front matter (metadata, not prose).
#
# NOTE: the "## Archived Comments" / "## Discussion" sections (imported
# third-party comment threads + giscus footer) are also non-author content that
# must not be linted — but Vale's BlockIgnores cannot drop a heading-to-EOF span
# that crosses multiple Markdown blocks, so that exclusion is enforced in the
# Python tooling (blog_text.author_body, used by the gate's LanguageTool/cap
# stages and the findings collector) rather than here. For whole-file Vale runs
# the net-new gate makes this moot: a new post has no archived comments, and
# pre-existing comment findings in an edited old post are grandfathered.
BlockIgnores = (?s) *(^---\n.*?\n---\n)

# Strip inline/self-closing Hugo shortcodes ({{< giscus >}}, {{% notice %}}, …)
# and honour the vale-skip directive (the comment plus the line it protects).
TokenIgnores = ({{[%<].*?[%>]}}), (?s)(<!-- vale-skip:[^\n]*-->\n[^\n]+\n)

write-good.Passive = NO
Microsoft.Passive = NO
write-good.E-Prime = NO
write-good.Weasel = NO
write-good.TooWordy = NO
write-good.ThereIs = NO
Microsoft.GeneralURL = NO
Microsoft.HeadingAcronyms = NO
Microsoft.Terms = NO
Microsoft.ComplexWords = NO
Microsoft.Acronyms = NO
Microsoft.Vocab = NO
Microsoft.Headings = NO
Microsoft.SentenceLength = NO
Microsoft.Ranges = NO
Microsoft.RangeFormat = NO
Microsoft.Negative = NO
Microsoft.Dashes = NO
Microsoft.Spacing = NO
Microsoft.Units = NO
Microsoft.Accessibility = NO
Microsoft.Semicolon = NO

# Blog voice / register (see rationale above).
Microsoft.We = NO
Microsoft.FirstPerson = NO
Microsoft.Contractions = NO
Microsoft.Adverbs = NO
Microsoft.Wordiness = NO
Microsoft.Auto = NO
proselint.Very = NO
proselint.Skunked = NO
proselint.Cliches = NO
proselint.Hyperbole = NO
proselint.But = NO
proselint.CorporateSpeak = NO
write-good.So = NO
write-good.Cliches = NO

# Date / time / heading format noise on migrated posts (see rationale above).
Microsoft.AMPM = NO
proselint.DateCase = NO
Microsoft.HeadingPunctuation = NO
Microsoft.HeadingColons = NO
Microsoft.Foreign = NO
Microsoft.DateOrder = NO
Microsoft.DateMidnight = NO
proselint.DateMidnight = NO
Microsoft.Ellipses = NO

# Microsoft.Quotes (582 hits): enforces American "punctuation inside quotes".
# The blog historically uses logical/British quoting, and around quoted literal
# values/identifiers moving the period inside is actively wrong. House-style
# preference, not a defect — re-enable if the blog adopts American quoting.
Microsoft.Quotes = NO
# proselint.Spelling here only fires on British/American pairs (color/colour),
# which are not typos. LanguageTool is the real spell checker for the blog.
proselint.Spelling = NO
