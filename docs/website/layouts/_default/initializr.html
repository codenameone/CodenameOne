{{- define "main" }}
<section class="cn1-initializr-page">
  <header class="cn1-initializr-header">
    {{ partial "breadcrumbs.html" . }}
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </header>

  <div class="cn1-initializr-shell" id="cn1-initializr-shell">
    <div class="cn1-initializr-loader" id="cn1-initializr-loader" aria-live="polite">
      <img class="icon" src="/initializr-app/icon.png" alt="Initializr icon" />
      <div class="cn1-loader-ring"></div>
      <div class="cn1-loader-progress">
        <div class="cn1-loader-progress-bar"></div>
      </div>
      <p class="cn1-loader-label">Loading Initializr...</p>
    </div>
    <iframe
            id="cn1-initializr-frame"
            class="cn1-initializr-frame"
            src="/initializr-app/index.html"
            title="Codename One Initializr"
            loading="eager">
    </iframe>
  </div>
</section>

<style>
  .cn1-initializr-page {
    max-width: 1180px;
    margin: 0 auto;
    padding: 1.25rem 1rem 2rem;
  }

  .cn1-initializr-header h1 {
    margin: 0.25rem 0 0.35rem;
  }

  .cn1-initializr-header p {
    margin: 0 0 1rem;
    opacity: 0.82;
  }

  .cn1-initializr-shell {
    position: relative;
    min-height: clamp(420px, 62vh, 760px);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: radial-gradient(circle at 20% 0%, #e9f1ff 0%, #f9fbff 40%, #ffffff 100%);
    box-shadow: 0 14px 42px rgba(0, 0, 0, 0.12);
  }

  body.dark .cn1-initializr-shell {
    background: radial-gradient(circle at 20% 0%, #172236 0%, #121a2a 45%, #0d1321 100%);
    box-shadow: 0 20px 48px rgba(0, 0, 0, 0.48);
  }

  .cn1-initializr-loader {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    align-content: center;
    gap: 1rem;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    color: #1d2638;
    background:
      radial-gradient(1000px 420px at 20% 0%, rgba(99, 142, 255, 0.22), rgba(99, 142, 255, 0) 65%),
      radial-gradient(720px 360px at 100% 100%, rgba(60, 173, 216, 0.2), rgba(60, 173, 216, 0) 65%);
    transition: opacity 220ms ease-out, visibility 220ms ease-out;
  }

  .cn1-initializr-loader.done {
    opacity: 0;
    visibility: hidden;
  }

  body.dark .cn1-initializr-loader {
    color: #d8e4ff;
  }

  .cn1-initializr-loader .icon {
    width: 110px;
    height: auto;
    border-radius: 18px;
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
  }

  .cn1-loader-ring {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 3px solid rgba(49, 105, 230, 0.25);
    border-top-color: #3169e6;
    animation: cn1-spin 0.9s linear infinite;
  }

  .cn1-loader-progress {
    width: min(340px, 75vw);
    height: 9px;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid rgba(49, 105, 230, 0.25);
    background: rgba(255, 255, 255, 0.7);
  }

  .cn1-loader-progress-bar {
    width: 35%;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #2f66e4, #3dc8d1);
    box-shadow: 0 0 18px rgba(47, 102, 228, 0.5);
    animation: cn1-shimmer 1.2s ease-in-out infinite;
  }

  .cn1-loader-label {
    margin: 0;
    font-size: 0.95rem;
    opacity: 0.88;
  }

  .cn1-initializr-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: transparent;
  }

  @keyframes cn1-spin {
    to { transform: rotate(360deg); }
  }

  @keyframes cn1-shimmer {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(300%); }
  }
</style>

<script>
  (function () {
    var frame = document.getElementById("cn1-initializr-frame");
    var loader = document.getElementById("cn1-initializr-loader");
    if (!frame || !loader) {
      return;
    }
    frame.addEventListener("load", function () {
      loader.classList.add("done");
    });
  })();
</script>
{{- end }}
