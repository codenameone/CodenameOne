baseURL = 'https://www.codenameone.com/'
languageCode = 'en-us'
title = 'Codename One'
theme = "PaperMod"
enableRobotsTXT = true

[outputFormats.Feed]
mediaType = "application/rss+xml"
baseName = "feed"
isPlainText = false
rel = "alternate"

[outputs]
home = ["HTML", "JSON"]
section = ["HTML"]
taxonomy = ["HTML"]
term = ["HTML"]

[params]
defaultTheme = "dark"
disableThemeToggle = false
mainSections = ["blog"]
author = "Codename One"
homeTitle = "Codename One: Native Apps in Java with a UI You Control"
description = "Build native iOS, Android, desktop, web, watch, TV, and vehicle apps in Java. One codebase, a UI you control, and cloud iOS builds without a Mac."
keywords = [
  "codename one",
  "cross platform app development",
  "cross platform mobile development",
  "write once run anywhere",
  "java",
]

[params.assets]
favicon = "favicon.ico"
favicon16x16 = "favicon.ico"
favicon32x32 = "favicon.ico"
apple_touch_icon = "favicon.ico"

[params.label]
text = "CODENAME ONE"
icon = "/uploads/Codename-One-White-Logo.png"
iconHeight = 34

