# Simulator hooks of the JavaSE port's simulated Bluetooth stack.
# Loaded by com.codename1.impl.javase.simulator.SimulatorHookLoader; the
# labeled items surface as the simulator's "Bluetooth" menu, every item is
# also callable cross-platform via CN.execute("bluetooth:itemN").
name=Bluetooth
namespace=bluetooth

item1=com.codename1.impl.javase.BluetoothSimulatorHooks#toggleAdapter
label1=Toggle Adapter

item2=com.codename1.impl.javase.BluetoothSimulatorHooks#addDemoPeripheral
label2=Add Demo Peripheral

item3=com.codename1.impl.javase.BluetoothSimulatorHooks#pushDemoNotification
label3=Push Demo Notification

item4=com.codename1.impl.javase.BluetoothSimulatorHooks#disconnectAll
label4=Disconnect All

item5=com.codename1.impl.javase.BluetoothSimulatorHooks#clearPeripherals
label5=Clear Peripherals

item6=com.codename1.impl.javase.BluetoothSimulatorHooks#switchToSimulatorBackend
label6=Use Simulator Backend

item7=com.codename1.impl.javase.BluetoothSimulatorHooks#switchToNativeBackend
label7=Use Native Backend

# API-only (no label): arms the next GATT read to fail. For tests/scripts:
# CN.execute("bluetooth:item8")
item8=com.codename1.impl.javase.BluetoothSimulatorHooks#primeReadFailure
