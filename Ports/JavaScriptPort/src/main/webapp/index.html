<!DOCTYPE html>
<html data-cn1-app-version="{APP_VERSION}">
  <head>
    <!-- BEFORE-HEAD-INCLUDES -->
    <title>{APP_TITLE}</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
    <script>
        window.cn1_debug_flags = {
              disableTouchstart: false,
              disableTouchend: false,
              disableHover: false,
              disableMouseup: false,
              disableMousedown: false,
              disableWheel: false,
              debugLog: false,
              useNativeQueue: false
        };
   (function(){
    var cn1ToLoad = {
        /*
         'file1' : {size:1000, loaded:false},
         'file2' : {size:1045, loaded:false},
         'file3' : {size:1000, loaded:false},
         'file4' : {size:10450, loaded:false},
         'file5' : {size:1000, loaded:false},
         'file6' : {size:1045, loaded:false},
        */
    
    };
    
    /* CN1-TO-LOAD-PLACEHOLDER */
    var cn1LoadingProgressHandle = window.setInterval(function() {
        if (!window.jQuery) return;
        if (jQuery('#cn1-splash').length == 0) {
            clearInterval(cn1LoadingProgressHandle);
            return;
        }
        var bytesRequired = 0;
        var bytesLoaded = 0;
        for (var f in cn1ToLoad) {
            bytesRequired += cn1ToLoad[f].size;
            if (cn1ToLoad[f].loaded) {
                bytesLoaded += cn1ToLoad[f].size;
            }
        }
        var progressBar = jQuery('#cn1-splash > .progress-bar');
        //jQuery('#cn1-splash > img.progress').hide();
        progressBar.show();
        var percentLoaded = Math.round(bytesLoaded / bytesRequired * 100.0)+'%';
        jQuery('.progress-bar-internal', progressBar).css('width', percentLoaded);
    }, 200);
    
    window.cn1LoadedFile = function(filename) {
        if (filename.indexOf('?') >= 0) {
            filename = filename.substring(0, filename.indexOf('?'));
        }
        
        if (cn1ToLoad[filename]) {
            cn1ToLoad[filename].loaded = true;
        }
    };
    })();
   </script>
    <link rel="icon" type="image/png" href="icon.png?v={APP_VERSION}">
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="mobile-web-app-capable" content="yes" />
    <!--<meta name="viewport" content="user-scalable=no" />-->
    <meta name="viewport"
      content="
        height = device-height,
        width = device-width,
        initial-scale = 1.0,
        minimum-scale = 1.0,
        maximum-scale = 1.0,
        user-scalable = no,
        target-densitydpi = device-dpi
        " />
    
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css?v={APP_VERSION}">

    <!-- Optional theme -->
    <link rel="stylesheet" href="css/bootstrap-theme.min.css?v={APP_VERSION}">

    
    
    <link rel="stylesheet" type="text/css" href="style.css?v={APP_VERSION}">
    <link rel="manifest" href="manifest.json?v={APP_VERSION}"/>

    <!-- Pre-register the material icon font up front so Toolbar/Tabs/Picker icons
         render without waiting for the worker-side TTF load path, which in the
         current worker-only architecture cannot reach document/@font-face. The
         font is bundled at assets/material-design-font.ttf (relocated by
         scripts/build-javascript-port-hellocodenameone.sh). FontImage.java asks
         for font-family "Material Icons" so that name must match. -->
    <style type="text/css">
    @font-face {
        font-family: 'Material Icons';
        src: url('assets/material-design-font.ttf?v={APP_VERSION}') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: block;
    }
    </style>
    
    <!-- CN1-CSS-INCLUDES -->
    
    <!--

        Alternatively you are not using the .war distribution or you want to use
        the proxy separately, you can specify the build hint:
            javascript.proxy.url=http://yourdomain.com/yourapp/cn1-cors-proxy?_target=
    
        You can also set this value inside your application using:
    
            Display.getInstance().setProperty("javascript.proxy.url", "http://yourdomain.com/yourapp/cn1-cors-proxy?_target=");
    
        For more information about the CORS proxy, see https://github.com/shannah/cors-proxy
    -->
    <script type="text/javascript">
        //INJECT-DEFAULT-PROXY

        //window.cn1CORSProxyURL='/cn1-cors-proxy?_target=';
        
    </script>
