name: Test JavaScript screenshot scripts

on:
  pull_request:
    paths:
      - '.github/workflows/scripts-javascript.yml'
      - 'scripts/run-javascript-browser-tests.sh'
      - 'scripts/run-javascript-screenshot-tests.sh'
      - 'scripts/run-javascript-headless-browser.mjs'
      - 'scripts/run-javascript-lifecycle-tests.mjs'
      - 'scripts/run-javascript-lifecycle-tests.sh'
      - 'scripts/build-javascript-port-hellocodenameone.sh'
      - 'scripts/javascript_browser_harness.py'
      - 'scripts/javascript/screenshots/**'
      - 'scripts/lib/cn1ss.sh'
      - 'scripts/common/java/**'
      - 'scripts/hellocodenameone/**'
      - 'Ports/JavaScriptPort/**'
      - 'vm/**'
      - 'maven/**'
      - '!maven/core-unittests/**'
      - '!docs/**'
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/scripts-javascript.yml'
      - 'scripts/run-javascript-browser-tests.sh'
      - 'scripts/run-javascript-screenshot-tests.sh'
      - 'scripts/run-javascript-headless-browser.mjs'
      - 'scripts/run-javascript-lifecycle-tests.mjs'
      - 'scripts/run-javascript-lifecycle-tests.sh'
      - 'scripts/build-javascript-port-hellocodenameone.sh'
      - 'scripts/javascript_browser_harness.py'
      - 'scripts/javascript/screenshots/**'
      - 'scripts/lib/cn1ss.sh'
      - 'scripts/common/java/**'
      - 'scripts/hellocodenameone/**'
      - 'Ports/JavaScriptPort/**'
      - 'vm/**'
      - 'maven/**'
      - '!maven/core-unittests/**'
      - '!docs/**'

jobs:
  javascript-screenshots:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.CN1SS_GH_TOKEN }}
      GH_TOKEN: ${{ secrets.CN1SS_GH_TOKEN }}
      ARTIFACTS_DIR: ${{ github.workspace }}/artifacts/javascript-ui-tests
      # CN1_JS_TIMEOUT_SECONDS guards the per-suite SUITE:FINISHED wait.
      # Bumped from 720s to 1200s after merging master's #4875 chunk-emit
      # fix and removing the ``jsChunkDrop`` skip block in port.js: with
      # the previously-silent graphics / chart / kotlin / mainscreen /
      # transition tests now actually rendering and emitting full PNG
      # streams instead of being dropped, the 73-test suite walks at
      # ~10 s/test on shared GHA runners and lands 12-17 min wall-clock
      # depending on canvas-accumulation pressure later in the run. The
      # 720s budget was too tight: comparison-step runs succeed at 12-14
      # min but SUITE:FINISHED-wait runs that race the bottom of the
      # suite were timing out before any tests could be diff'd. 1200s
      # absorbs the variance without re-introducing the
      # silently-dropped-test workaround.
      #
      # Bumped again from 1800s to 2700s (45 min) after PR #5125's
      # DualAppearance safety nets unblocked the 14 modern-theme tests
      # introduced by #5054. On the GHA shared runners every test in
      # that batch eats ~16-20s wall (light + dark phases, each paying
      # a 1500ms registerReadyCallback + triple callSerially + chunked
      # PNG emit, plus the canvas-accumulation slowdown that's well-
      # documented under chartDocStaleness).
      #
      # Bumped again from 2700s to 3600s (60 min) after observing
      # large runner-speed variance on shared GHA hosts. Fast runners
      # walk the 95-test suite in ~25-30s/test (~50 min total with
      # safety nets); slow runners eat ~150s/test on the same code
      # (the cooperative scheduler appears noisy-neighbour-sensitive
      # on the worker thread). 60 min absorbs the slow case without
      # spilling into the GitHub Actions job ceiling (default 6h)
      # while still leaving room for the post-suite comparison +
      # report-generation steps. CN1_JS_BROWSER_LIFETIME_SECONDS
      # stays 60s shy of the bash wait so the in-page sentinel fires
      # before the outer timeout and we get a graceful suite shutdown
      # with artifacts uploaded.
      CN1_JS_TIMEOUT_SECONDS: "3600"
      CN1_JS_BROWSER_LIFETIME_SECONDS: "3540"
      CN1SS_SKIP_COVERAGE: "1"
      CN1SS_FAIL_ON_MISMATCH: "1"
      BROWSER_CMD: "node \"$GITHUB_WORKSPACE/scripts/run-javascript-headless-browser.mjs\""
    steps:
      - uses: actions/checkout@v4

      - name: Set TMPDIR
        run: echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV

      - name: Cache codenameone-tools
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/codenameone-tools
          key: ${{ runner.os }}-cn1-tools-${{ hashFiles('scripts/setup-workspace.sh') }}
          restore-keys: |
            ${{ runner.os }}-cn1-tools-

      - name: Set up Java 8 for ParparVM
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
          cache: 'maven'

      - name: Prepare Codename One binaries for Maven plugin
        run: |
          mkdir -p ~/.codenameone
          cp maven/UpdateCodenameOne.jar ~/.codenameone/

      - name: Build ParparVM compiler bundle
        run: mvn -B -f maven/pom.xml -pl parparvm -am -DskipTests -Dmaven.javadoc.skip=true package

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm modules for scripts/
        uses: actions/cache@v4
        with:
          path: scripts/node_modules
          key: ${{ runner.os }}-scripts-npm-playwright-v1
          restore-keys: |
            ${{ runner.os }}-scripts-npm-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v2
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: |
          cd scripts
          npm init -y 2>/dev/null || true
          npm install playwright
          # OS-level deps (apt packages) aren't cached so always install them.
          npx playwright install-deps chromium
          # `npm install playwright` resolves the floating version, so the
          # cached browser binary can drift away from what the freshly
          # installed Playwright expects (the cache only stores the binary).
          # `install chromium` is a no-op when the versions match and
          # re-downloads the right build when they don't, so it makes the
          # job resilient to Playwright revving its bundled chromium build
          # in between cache writes.
          npx playwright install chromium

      - name: Install Xvfb for headless Java AWT
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Setup workspace
        run: xvfb-run ./scripts/setup-workspace.sh -q -DskipTests

      - name: Build HelloCodenameOne JavaScript port bundle
        run: |
          # Use JAVA_HOME set by actions/setup-java for Java 17
          # (JAVA_HOME_17_X64 is always available after setup-java@v4)
          export JAVA_HOME="${JAVA_HOME_17_X64}"
          export PATH="$JAVA_HOME/bin:$PATH"
          echo "Using JAVA_HOME=$JAVA_HOME"
          java -version

          # xvfb-run is required for CSS compilation which uses java.awt
          SKIP_PARPARVM_BUILD=1 xvfb-run ./scripts/build-javascript-port-hellocodenameone.sh "${GITHUB_WORKSPACE}/artifacts/javascript-ui-tests/hellocodenameone-javascript-port.zip"

      - name: Locate JavaScript bundle
        id: locate_bundle
        run: |
          set -euo pipefail
          bundle="$(ls -1 \
            artifacts/javascript-ui-tests/hellocodenameone-javascript-port.zip \
            scripts/hellocodenameone/parparvm/target/hellocodenameone-javascript-port.zip \
            2>/dev/null | head -n1 || true)"
          if [ -z "$bundle" ]; then
            echo "Unable to locate HelloCodenameOne JavaScript-port bundle" >&2
            exit 1
          fi
          echo "bundle=$bundle" >> "$GITHUB_OUTPUT"

      - name: Run JavaScript lifecycle test
        # Validates that the bundled app reaches both ``cn1Initialized``
        # and ``cn1Started`` lifecycle flags within a per-bundle timeout
        # — i.e. ``Lifecycle.init`` and ``Lifecycle.start`` both
        # complete without throwing or hanging. Captures every
        # ``PARPAR-LIFECYCLE`` marker and the most recent
        # ``PARPAR:DIAG:FIRST_FAILURE`` so a stuck boot is visible
        # without having to download the full screenshot-test
        # browser log. Runs BEFORE the screenshot suite because if
        # the lifecycle test fails the screenshots are doomed to
        # time out anyway, and we want fast feedback for boot
        # regressions.
        #
        # ``continue-on-error: true`` because the boot path is
        # currently flaky on shared GHA runners (same bundle, same
        # workflow: one runner finishes ``cn1Started`` in ~4s, the
        # next stalls at host-callback id=11 even with a 480s
        # budget). Until that variance is understood, treat the
        # lifecycle marker as advisory and keep going so the
        # screenshot suite — which has its own per-suite timeout
        # and would always fail-fast in the same circumstances —
        # still gets a chance to run and surface its own results.
        # The lifecycle artifact upload below preserves the
        # ``report.json`` either way.
        continue-on-error: true
        env:
          # CI runners process bytecode-translator output noticeably
          # slower than local, and shared GitHub Actions runners can
          # vary by 5-10× in cooperative-scheduler throughput. The
          # passing runs converge around 90-100 host callbacks in
          # 240s; on a slow runner the same boot stalls below 20
          # callbacks in the same window, far short of
          # ``main-thread-completed``. 480s eats the worst case
          # without hiding regressions (the passing path returns
          # within ~30s either way).
          CN1_LIFECYCLE_TIMEOUT_SECONDS: "480"
          CN1_LIFECYCLE_REPORT_DIR: ${{ github.workspace }}/artifacts/javascript-lifecycle-tests
        run: |
          mkdir -p "${CN1_LIFECYCLE_REPORT_DIR}"
          # Only the HelloCodenameOne bundle is built locally in this
          # workflow; the Initializr bundle goes through the cloud
          # build and isn't available on the runner. Pass the local
          # bundle explicitly so the test doesn't try to rebuild
          # missing artifacts.
          node scripts/run-javascript-lifecycle-tests.mjs \
            "${{ steps.locate_bundle.outputs.bundle }}"

      - name: Upload JavaScript lifecycle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javascript-lifecycle-tests
          path: artifacts/javascript-lifecycle-tests
          if-no-files-found: warn
          retention-days: 14

      - name: Run JavaScript screenshot browser tests
        run: |
          mkdir -p "${ARTIFACTS_DIR}"
          ./scripts/run-javascript-browser-tests.sh "${{ steps.locate_bundle.outputs.bundle }}" "${GITHUB_WORKSPACE}/scripts/javascript/screenshots"

      - name: Upload JavaScript screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javascript-ui-tests
          path: artifacts/javascript-ui-tests
          if-no-files-found: warn
          retention-days: 14
