name: PR CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths-ignore:
      - '.github/workflows/scripts-android.yml'
      - '.github/workflows/scripts-ios.yml'
      - 'scripts/**'
      - '!scripts/setup-workspace.sh'
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/developer-guide-docs.yml'
      - '.github/workflows/website-docs.yml'
      - '.github/workflows/initializr-cn1-version-pr.yml'
      - 'CodenameOneDesigner/**'
      - 'Ports/IOSPort/**'
  push:
    branches:
      - master
    paths-ignore:
      - '.github/workflows/scripts-android.yml'
      - '.github/workflows/scripts-ios.yml'
      - 'scripts/**'
      - '!scripts/setup-workspace.sh'
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/developer-guide-docs.yml'
      - '.github/workflows/website-docs.yml'
      - '.github/workflows/initializr-cn1-version-pr.yml'
      - 'CodenameOneDesigner/**'
      - 'Ports/IOSPort/**'

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: read

concurrency:
  # Cancel superseded runs of this workflow for the same PR branch
  # (github.head_ref is set on pull_request events). On push to master
  # head_ref is empty, so the group falls back to the unique run_id and
  # every master commit is still tested in full -- no coverage lost.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-test:

    runs-on: ubuntu-latest
    timeout-minutes: 60
    container: ghcr.io/codenameone/codenameone/pr-ci-container:latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        java-version: [8, 17, 21]

    steps:
      - uses: actions/checkout@v6
      - name: Validate Java 25 markdown docs style (CodenameOne + CLDC11)
        run: ./.github/scripts/validate-java25-markdown-docs.sh
      - name: Set up Java
        run: |
          if [ "${{ matrix.java-version }}" = "8" ]; then
             echo "JAVA_HOME=${JAVA_HOME_8}" >> $GITHUB_ENV
             echo "${JAVA_HOME_8}/bin" >> $GITHUB_PATH
          elif [ "${{ matrix.java-version }}" = "17" ]; then
             echo "JAVA_HOME=${JAVA_HOME_17}" >> $GITHUB_ENV
             echo "${JAVA_HOME_17}/bin" >> $GITHUB_PATH
          elif [ "${{ matrix.java-version }}" = "21" ]; then
             echo "JAVA_HOME=${JAVA_HOME_21}" >> $GITHUB_ENV
             echo "${JAVA_HOME_21}/bin" >> $GITHUB_PATH
          fi
      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2
      - name: Set up Node
        if: ${{ matrix.java-version == 8 }}
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Run Unit Tests
        run: |
          MVN_GOAL="verify"
          MVN_ARGS=""
          if [ "${{ matrix.java-version }}" != "8" ]; then
            MVN_GOAL="test"
            MVN_ARGS="-Dspotbugs.skip=true -Dpmd.skip=true -Dcheckstyle.skip=true -Djacoco.skip=true"
          fi
          cd maven
          mvn clean "$MVN_GOAL" -DunitTests=true -pl core-unittests -am -Dmaven.javadoc.skip=true -Plocal-dev-javase $MVN_ARGS
          cd ..
      - name: Build CSS compiler and smoke native-themes
        if: ${{ matrix.java-version == 8 }}
        run: |
          cd maven
          mvn -B -pl css-compiler -am install -DskipTests -Dmaven.javadoc.skip=true -Plocal-dev-javase
          cd ..
          ./scripts/build-native-themes.sh
          test -f Themes/iOSModernTheme.res || { echo "missing Themes/iOSModernTheme.res"; exit 1; }
          test -f Themes/AndroidMaterialTheme.res || { echo "missing Themes/AndroidMaterialTheme.res"; exit 1; }
      - name: Prepare Codename One binaries for Maven plugin tests
        if: ${{ matrix.java-version == 8 }}
        run: |
          set -euo pipefail
          rm -rf maven/target/cn1-binaries
          mkdir -p maven/target
          cp -r /opt/cn1-binaries maven/target/cn1-binaries
      - name: Run Maven plugin tests
        if: ${{ matrix.java-version == 8 }}
        working-directory: maven
        env:
          CN1_BINARIES: ${{ github.workspace }}/maven/target/cn1-binaries
        run: |
          mvn -B -Dmaven.javadoc.skip=true \
            -DunitTests=true \
            -Dcodename1.platform=javase \
            -Dcn1.binaries="${CN1_BINARIES}" \
            -pl codenameone-maven-plugin -am -Plocal-dev-javase test
      - name: Install native BLE runtime dependency (libdbus)
        if: ${{ matrix.java-version == 8 }}
        # libcn1ble.so (the JavaSE native Bluetooth backend) links libdbus-1
        # for BlueZ, so it must be present for the native-engine integration
        # tests to load the library. Also baked into the pr-ci-container image
        # (.ci/container/Dockerfile); this step covers running against the
        # previously published container before the rebuild propagates.
        run: apt-get update -qq && apt-get install -y -qq libdbus-1-3
      - name: Run JavaSE port unit tests
        if: ${{ matrix.java-version == 8 }}
        # Surface regressions in the simulator-side helpers (CSSWatcher
        # localization, MavenUtils designer-jar resolution, JavaSEPort font
        # mapping). Without this step the tests in maven/javase compile but
        # never execute on PRs. We install the javase module's transitive
        # deps first (sqlite-jdbc, factory, etc. -- earlier steps don't
        # publish them to the local repo) so the test invocation can resolve
        # them, then run javase's tests in isolation.
        working-directory: maven
        env:
          CN1_BINARIES: ${{ github.workspace }}/maven/target/cn1-binaries
        run: |
          mvn -B -Dmaven.javadoc.skip=true \
            -Dcodename1.platform=javase \
            -Dcn1.binaries="${CN1_BINARIES}" \
            -pl javase -am -Plocal-dev-javase -DskipTests install
          mvn -B -Dmaven.javadoc.skip=true \
            -Dcodename1.platform=javase \
            -Dcn1.binaries="${CN1_BINARIES}" \
            -pl javase -Plocal-dev-javase test
      - name: Determine AI/ad cn1libs to build
        id: cn1libs
        if: ${{ matrix.java-version == 8 }}
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          # This job runs inside the pr-ci-container, where GitHub's
          # checkout safe.directory entry can be written under a different
          # HOME than this shell step uses. Mark the workspace safe before
          # diffing the PR so unrelated cn1libs are not rebuilt.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          all_libs=(
            cn1-ai-mlkit-text
            cn1-ai-mlkit-barcode
            cn1-ai-mlkit-face
            cn1-ai-mlkit-labeling
            cn1-ai-mlkit-translate
            cn1-ai-mlkit-smartreply
            cn1-ai-mlkit-langid
            cn1-ai-mlkit-pose
            cn1-ai-mlkit-segmentation
            cn1-ai-mlkit-docscan
            cn1-ai-tflite
            cn1-ai-whisper
            cn1-ai-stablediffusion
            cn1-admob
            cn1-applovin
            cn1-unity-levelplay
            cn1-ads-mock
          )
          ai_libs=(
            cn1-ai-mlkit-text
            cn1-ai-mlkit-barcode
            cn1-ai-mlkit-face
            cn1-ai-mlkit-labeling
            cn1-ai-mlkit-translate
            cn1-ai-mlkit-smartreply
            cn1-ai-mlkit-langid
            cn1-ai-mlkit-pose
            cn1-ai-mlkit-segmentation
            cn1-ai-mlkit-docscan
            cn1-ai-tflite
            cn1-ai-whisper
            cn1-ai-stablediffusion
          )

          selected_libs=()
          add_lib() {
            local lib="$1"
            local selected_lib
            [ -d "maven/$lib" ] || return 0
            for selected_lib in "${selected_libs[@]}"; do
              [ "$selected_lib" = "$lib" ] && return 0
            done
            selected_libs+=("$lib")
          }
          add_all() {
            local lib
            for lib in "${all_libs[@]}"; do add_lib "$lib"; done
          }
          add_ai() {
            local lib
            for lib in "${ai_libs[@]}"; do add_lib "$lib"; done
          }

          changed_files=""
          if [ -n "${BASE_SHA:-}" ] && [[ "$BASE_SHA" != 0000000000000000000000000000000000000000 ]]; then
            git fetch --no-tags --depth=1 origin "$BASE_SHA" || true
            changed_files="$(git diff --name-only "$BASE_SHA" HEAD || true)"
          fi
          if [ -z "$changed_files" ]; then
            echo "Unable to determine changed files; building all AI/ad cn1libs."
            add_all
          else
            while IFS= read -r file; do
              case "$file" in
                maven/pom.xml|maven/codenameone-maven-plugin/*)
                  add_all
                  ;;
                scripts/gen-ai-cn1libs.py)
                  add_ai
                  ;;
                maven/cn1-ai-*/*|maven/cn1-admob/*|maven/cn1-applovin/*|maven/cn1-unity-levelplay/*|maven/cn1-ads-mock/*|maven/cn1-ads-mock)
                  lib="${file#maven/}"
                  lib="${lib%%/*}"
                  add_lib "$lib"
                  ;;
              esac
            done <<< "$changed_files"
          fi

          libs=()
          modules=()
          for lib in "${all_libs[@]}"; do
            selected="false"
            for selected_lib in "${selected_libs[@]}"; do
              if [ "$selected_lib" = "$lib" ]; then
                selected="true"
                break
              fi
            done
            if [ "$selected" = "true" ]; then
              libs+=("$lib")
              if [ "$lib" = "cn1-ads-mock" ]; then
                modules+=("$lib")
              else
                modules+=("$lib/common")
              fi
            fi
          done

          {
            printf 'libs='
            (IFS=,; printf '%s' "${libs[*]:-}")
            printf '\nmodules='
            (IFS=,; printf '%s' "${modules[*]:-}")
            printf '\n'
          } >> "$GITHUB_OUTPUT"

          if [ ${#libs[@]} -eq 0 ]; then
            echo "No AI/ad cn1lib changes detected; skipping cn1lib packaging step."
          else
            echo "AI/ad cn1libs selected for packaging: ${libs[*]}"
          fi
      - name: Build changed/impacted AI and ad cn1libs
        if: ${{ matrix.java-version == 8 && steps.cn1libs.outputs.modules != '' }}
        # Exercises every cn1-ai-* and ad-provider multi-module project:
        # compiles the common module, runs its JUnit 5 tests, and packages
        # the .cn1lib archive (including native iOS Obj-C / Android Java
        # sources). The detector above limits this to changed cn1libs unless
        # shared inputs changed, in which case all impacted cn1libs are rebuilt.
        working-directory: maven
        env:
          CN1_BINARIES: ${{ github.workspace }}/maven/target/cn1-binaries
          CN1LIB_LIBS: ${{ steps.cn1libs.outputs.libs }}
          CN1LIB_MODULES: ${{ steps.cn1libs.outputs.modules }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          python3 ../scripts/gen-ai-cn1libs.py > /tmp/gen-ai.log
          # Capture a list of changed files instead of using --exit-code/--quiet,
          # which interacted poorly with the surrounding `set -e -o pipefail`.
          ai_drift_paths=()
          IFS=',' read -r -a libs <<< "$CN1LIB_LIBS"
          for lib in "${libs[@]}"; do
            case "$lib" in
              cn1-ai-*) ai_drift_paths+=("maven/$lib") ;;
            esac
          done
          if [ ${#ai_drift_paths[@]} -gt 0 ]; then
            drift=$(git -C .. status --porcelain -- "${ai_drift_paths[@]}" || true)
            if [ -n "$drift" ]; then
              echo "::error::Checked-in cn1-ai-* tree is out of sync with scripts/gen-ai-cn1libs.py"
              echo "$drift"
              git -C .. --no-pager diff -- "${ai_drift_paths[@]}" || true
              exit 1
            fi
          fi
          # The cn1lib mojo is part of codenameone-maven-plugin and isn't
          # in m2 from prior CI steps (those run the plugin's tests but
          # don't install it, and -am pulls in transitive deps not yet
          # built here -- designer, java-runtime, ports). Install the
          # plugin + everything it transitively needs, then run package
          # on each cn1lib's common module.
          mvn -B -Dmaven.javadoc.skip=true \
            -Dcn1.binaries="${CN1_BINARIES}" \
            -Plocal-dev-javase \
            -pl codenameone-maven-plugin -am -DskipTests install
          mvn -B -Dmaven.javadoc.skip=true \
            -Dcn1.binaries="${CN1_BINARIES}" \
            -Plocal-dev-javase \
            -pl "$CN1LIB_MODULES" \
            package
      - name: Run SpotBugs for ports and Maven plugin
        if: ${{ matrix.java-version == 8 }}
        working-directory: maven
        env:
          CN1_BINARIES: ${{ github.workspace }}/maven/target/cn1-binaries
        run: |
          mvn -B -DskipTests=true \
            -Dcn1.binaries="${CN1_BINARIES}" \
            -Pcompile-android \
            -pl android,ios,codenameone-maven-plugin -am verify
      - name: Run SpotBugs for ByteCodeTranslator
        if: ${{ matrix.java-version == 8 }}
        run: mvn -B -DskipTests=true -f vm/ByteCodeTranslator/pom.xml verify
      - name: Run JavaScript Port smoke integration
        if: ${{ matrix.java-version == 8 }}
        working-directory: vm
        run: mvn -B test -pl tests -am -DfailIfNoTests=false -Dsurefire.failIfNoSpecifiedTests=false -Dtest=JavaScriptPortSmokeIntegrationTest
      - name: Generate static analysis HTML summaries
        if: ${{ always() && matrix.java-version == 8 }}
        env:
          QUALITY_REPORT_TARGET_DIRS: maven/core-unittests/target:maven/android/target:maven/ios/target:vm/ByteCodeTranslator/target:maven/codenameone-maven-plugin/target
          QUALITY_REPORT_SERVER_URL: ${{ github.server_url }}
          QUALITY_REPORT_REPOSITORY: ${{ github.repository }}
          QUALITY_REPORT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          QUALITY_REPORT_GENERATE_HTML_ONLY: "1"
        run: python3 .github/scripts/generate-quality-report.py
      - name: Collect quality artifacts
        if: ${{ always() && matrix.java-version == 8 }}
        run: |
          set -euo pipefail
          mkdir -p quality-artifacts/static-analysis
          mkdir -p quality-artifacts/coverage
          shopt -s nullglob
          for entry in \
            "core-unittests:maven/core-unittests/target" \
            "android:maven/android/target" \
            "ios:maven/ios/target" \
            "bytecode-translator:vm/ByteCodeTranslator/target" \
            "maven-plugin:maven/codenameone-maven-plugin/target"; do
            label="${entry%%:*}"
            dir="${entry#*:}"
            for filename in spotbugsXml.xml spotbugs.xml; do
              if [ -f "${dir}/${filename}" ]; then
                cp "${dir}/${filename}" "quality-artifacts/static-analysis/spotbugs-${label}.xml"
                break
              fi
            done
          done
          if [ -f maven/core-unittests/target/pmd.xml ]; then
            cp maven/core-unittests/target/pmd.xml quality-artifacts/static-analysis/
          fi
          if [ -f maven/core-unittests/target/checkstyle-result.xml ]; then
            cp maven/core-unittests/target/checkstyle-result.xml quality-artifacts/static-analysis/
          fi
          if [ -d target/quality-report ]; then
            mkdir -p quality-artifacts/static-analysis/html
            cp -R target/quality-report/. quality-artifacts/static-analysis/html/
          fi
          if [ -d maven/core-unittests/target/site/jacoco ]; then
            cp -R maven/core-unittests/target/site/jacoco quality-artifacts/coverage/
          fi
          if [ "$(find quality-artifacts -type f | wc -l)" -eq 0 ]; then
            echo "No quality artifacts were generated." > quality-artifacts/README.txt
          fi
      - name: Upload quality artifacts
        if: ${{ always() && matrix.java-version == 8 }}
        id: upload-quality-artifacts
        uses: actions/upload-artifact@v7
        with:
          name: quality-artifacts
          path: quality-artifacts
      - name: Publish quality report previews
        if: ${{ always() && matrix.java-version == 8 && github.server_url == 'https://github.com' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        id: publish-quality-previews
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ "${SERVER_URL}" != "https://github.com" ]; then
            echo "HTML previews are only published for github.com instances."
            exit 0
          fi
          run_dir="runs/${RUN_ID}-${RUN_ATTEMPT}"
          tmp_dir=$(mktemp -d)
          dest_dir="${tmp_dir}/${run_dir}"
          mkdir -p "${dest_dir}"
          has_content=0
          if compgen -G "target/quality-report/*.html" > /dev/null; then
            mkdir -p "${dest_dir}/static-analysis"
            cp target/quality-report/*.html "${dest_dir}/static-analysis/"
            has_content=1
          fi
          if [ -d maven/core-unittests/target/site/jacoco ] && [ -f maven/core-unittests/target/site/jacoco/index.html ]; then
            mkdir -p "${dest_dir}/coverage"
            cp -R maven/core-unittests/target/site/jacoco/. "${dest_dir}/coverage/"
            has_content=1
          fi
          if [ "${has_content}" -eq 0 ]; then
            echo "No HTML outputs detected; skipping preview publishing."
            exit 0
          fi
          printf '%s\n%s\n%s\n' \
            '# Quality report previews' \
            '' \
            'This branch is automatically managed by the PR CI workflow and may be force-pushed.' \
            > "${tmp_dir}/README.md"
          git -C "${tmp_dir}" init -b previews >/dev/null
          git -C "${tmp_dir}" config user.name "github-actions[bot]"
          git -C "${tmp_dir}" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "${tmp_dir}" add .
          git -C "${tmp_dir}" commit -m "Publish quality report previews for run ${RUN_ID} (attempt ${RUN_ATTEMPT})" >/dev/null
          remote_url="${SERVER_URL}/${REPOSITORY}.git"
          token_remote_url="${remote_url/https:\/\//https://x-access-token:${GITHUB_TOKEN}@}"
          for push_attempt in 1 2 3 4 5; do
            if git -C "${tmp_dir}" push --force "${token_remote_url}" previews:quality-report-previews >/dev/null; then
              break
            fi
            if [ "${push_attempt}" -eq 5 ]; then
              echo "Failed to publish quality report previews after ${push_attempt} attempts." >&2
              exit 1
            fi
            sleep $((push_attempt * 3))
          done
          commit_sha=$(git -C "${tmp_dir}" rev-parse HEAD)
          raw_base="https://raw.githubusercontent.com/${REPOSITORY}/${commit_sha}/${run_dir}"
          preview_base="https://htmlpreview.github.io/?${raw_base}"
          {
            echo "commit=${commit_sha}"
            echo "run_path=${run_dir}"
          } >> "$GITHUB_OUTPUT"
          if [ -f "${dest_dir}/static-analysis/spotbugs.html" ]; then
            echo "spotbugs_url=${preview_base}/static-analysis/spotbugs.html" >> "$GITHUB_OUTPUT"
          fi
          if [ -f "${dest_dir}/static-analysis/pmd.html" ]; then
            echo "pmd_url=${preview_base}/static-analysis/pmd.html" >> "$GITHUB_OUTPUT"
          fi
          if [ -f "${dest_dir}/static-analysis/checkstyle.html" ]; then
            echo "checkstyle_url=${preview_base}/static-analysis/checkstyle.html" >> "$GITHUB_OUTPUT"
          fi
          if [ -f "${dest_dir}/coverage/index.html" ]; then
            echo "jacoco_url=${preview_base}/coverage/index.html" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate quality report summary
        if: ${{ always() && matrix.java-version == 8 }}
        env:
          QUALITY_REPORT_TARGET_DIRS: maven/core-unittests/target:maven/android/target:maven/ios/target:vm/ByteCodeTranslator/target:maven/codenameone-maven-plugin/target
          QUALITY_REPORT_SERVER_URL: ${{ github.server_url }}
          QUALITY_REPORT_REPOSITORY: ${{ github.repository }}
          QUALITY_REPORT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          SPOTBUGS_REPORT_URL: ${{ steps.upload-quality-artifacts.outputs.artifact-url }}
          PMD_REPORT_URL: ${{ steps.upload-quality-artifacts.outputs.artifact-url }}
          CHECKSTYLE_REPORT_URL: ${{ steps.upload-quality-artifacts.outputs.artifact-url }}
          JACOCO_REPORT_URL: ${{ steps.upload-quality-artifacts.outputs.artifact-url }}
          SPOTBUGS_HTML_URL: ${{ steps.publish-quality-previews.outputs.spotbugs_url }}
          PMD_HTML_URL: ${{ steps.publish-quality-previews.outputs.pmd_url }}
          CHECKSTYLE_HTML_URL: ${{ steps.publish-quality-previews.outputs.checkstyle_url }}
          JACOCO_HTML_URL: ${{ steps.publish-quality-previews.outputs.jacoco_url }}
        run: python3 .github/scripts/generate-quality-report.py
      - name: Upload quality report summary
        if: ${{ always() && matrix.java-version == 8 }}
        uses: actions/upload-artifact@v7
        with:
          name: quality-report
          path: quality-report.md
      - name: Publish quality report comment
        if: ${{ github.event_name == 'pull_request' && matrix.java-version == 8 }}
        uses: actions/github-script@v9
        with:
          script: |
            const { publishQualityComment } = require('./.github/scripts/publish-quality-comment.js');
            await publishQualityComment({ github, context, core });
      - name: Link cn1-binaries
        if: ${{ matrix.java-version == 8 }}
        run: ln -s /opt/cn1-binaries ../cn1-binaries
      - name: Use upstream JCEF for the Ant build
        if: ${{ matrix.java-version == 8 }}
        run: ./scripts/ci-install-upstream-jcef-jar.sh
      - name: Build CLDC11 JAR
        if: ${{ matrix.java-version == 8 }}
        run: ant -noinput -buildfile Ports/CLDC11/build.xml jar
      - name: Build with Ant
        if: ${{ matrix.java-version == 8 }}
        run: |
          mkdir -p ~/.codenameone
          cp maven/UpdateCodenameOne.jar ~/.codenameone/
          xvfb-run ant test-javase

      - name: Build Release
        if: matrix.java-version == 8
        run: ant -noinput -buildfile CodenameOne/build.xml weeklyLibUpdate

      - name: Set up Java 25 for JavaDocs
        if: matrix.java-version == 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Build JavaDocs
        if: matrix.java-version == 8
        run: ./.github/scripts/build_javadocs.sh

      - name: Restore Java 8 after JavaDocs
        if: matrix.java-version == 8
        run: |
          echo "JAVA_HOME=${JAVA_HOME_8}" >> $GITHUB_ENV
          echo "${JAVA_HOME_8}/bin" >> $GITHUB_PATH

      - name: Upload JavaDocs artifact
        if: matrix.java-version == 8
        uses: actions/upload-artifact@v7
        with:
          name: CodenameOne-javadocs
          path: CodenameOne/javadocs.zip

      - name: Build iOS Port
        if: ${{ matrix.java-version == 8 }}
        run: ant -noinput -buildfile Ports/iOSPort/build.xml jar

      - name: Build iOS VM API
        if: ${{ matrix.java-version == 8 }}
        run: mvn -f vm/JavaAPI/pom.xml package

      - name: Upload a Build Artifact
        if: matrix.java-version == 8
        uses: actions/upload-artifact@v7
        with:
          name: JavaAPI.jar
          path: vm/JavaAPI/target/JavaAPI-1.0-SNAPSHOT.jar

      - name: Build iOS VM
        if: ${{ matrix.java-version == 8 }}
        run: mvn -f vm/ByteCodeTranslator/pom.xml package

      - name: Upload a Build Artifact
        if: matrix.java-version == 8
        uses: actions/upload-artifact@v7
        with:
          name: ByteCodeTranslator.jar
          path: vm/ByteCodeTranslator/target/ByteCodeTranslator-1.0-SNAPSHOT.jar

      - name: Upload a Build Artifact
        if: matrix.java-version == 8
        uses: actions/upload-artifact@v7
        with:
          name: CLDC11.jar
          path: Ports/CLDC11/dist/CLDC11.jar

      - name: Build Android Port
        if: ${{ matrix.java-version == 8 }}
        run: ant -noinput -buildfile Ports/Android/build.xml jar

      - name: Packaging Everything
        if: matrix.java-version == 8
        run: zip -j result.zip CodenameOne/javadocs.zip CodenameOne/dist/CodenameOne.jar CodenameOne/updatedLibs.zip Ports/JavaSE/dist/JavaSE.jar build/CodenameOneDist/CodenameOne/demos/CodenameOne_SRC.zip

      - name: Copying Files to Server
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && matrix.java-version == 8 }}
        uses: marcodallasanta/ssh-scp-deploy@v1.0.5
        with:
          host: ${{ secrets.WP_HOST }}
          user: ${{ secrets.WP_USER }}
          password: ${{ secrets.WP_PASSWORD }}
          local: result.zip

      - name: Upload a Build Artifact
        if: matrix.java-version == 8
        uses: actions/upload-artifact@v7
        with:
          name: JavaSE.jar
          path: Ports/JavaSE/dist/JavaSE.jar
  
