name: CN1 Playground Language Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'scripts/cn1playground/**'
      - '.github/workflows/cn1playground-language.yml'
  push:
    branches: [main, master]
    paths:
      - 'scripts/cn1playground/**'
      - '.github/workflows/cn1playground-language.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  language-smoke:
    name: Playground language smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Ensure Xvfb is available
        run: |
          set -euo pipefail
          if ! command -v xvfb-run >/dev/null 2>&1; then
            bash scripts/ci/apt-get-update.sh
            sudo apt-get install -y xvfb
          fi

      # The playground is pinned to the in-repo 8.0-SNAPSHOT (it previews the
      # current framework + native themes), so the snapshot artifacts must be
      # installed into the local Maven repo before the smoke build resolves
      # them. Mirrors the website build's bootstrap.
      - name: Bootstrap local Codename One snapshots
        run: SKIP_CN1_ARCHETYPES=1 ./scripts/setup-workspace.sh -q -DskipTests

      - name: Run playground language smoke tests
        run: |
          set -euo pipefail
          cd scripts/cn1playground
          xvfb-run -a bash tools/run-playground-smoke-tests.sh
