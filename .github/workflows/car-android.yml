---
name: Car (Android Auto) integration

# Scoped to the in-car feature: triggers ONLY when the com.codename1.car API, the Android Auto glue,
# the on-device car test, or the car build wiring change. Builds the Hello Codename One app (which
# exercises the car API, so the build injects the androidx.car.app dependency + CarAppService) and
# runs it on a native Android emulator + asserts the injected Android Auto wiring.
'on':
  pull_request:
    paths:
      - '.github/workflows/car-android.yml'
      - 'CodenameOne/src/com/codename1/car/**'
      - 'Ports/Android/src/com/codename1/impl/android/AndroidCarSupport.java'
      - 'maven/codenameone-maven-plugin/src/main/resources/com/codename1/builders/car/**'
      - 'maven/codenameone-maven-plugin/src/main/java/com/codename1/builders/AndroidGradleBuilder.java'
      - 'scripts/hellocodenameone/common/src/main/kotlin/com/codenameone/examples/hellocodenameone/HelloCodenameOne.kt'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/car-android.yml'
      - 'CodenameOne/src/com/codename1/car/**'
      - 'Ports/Android/src/com/codename1/impl/android/AndroidCarSupport.java'
      - 'maven/codenameone-maven-plugin/src/main/resources/com/codename1/builders/car/**'
      - 'maven/codenameone-maven-plugin/src/main/java/com/codename1/builders/AndroidGradleBuilder.java'
      - 'scripts/hellocodenameone/common/src/main/kotlin/com/codenameone/examples/hellocodenameone/HelloCodenameOne.kt'

jobs:
  car-android:
    name: Car Android Auto
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.CN1SS_GH_TOKEN }}
      GH_TOKEN: ${{ secrets.CN1SS_GH_TOKEN }}
      # Keep CI quiet/strict: no PR comments, fail on screenshot mismatch.
      CN1SS_SKIP_COMMENT: '1'
      CN1SS_SKIP_COVERAGE: '1'
    steps:
      - uses: actions/checkout@v6
      - name: Set TMPDIR
        run: echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV
      - name: Cache codenameone-tools
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/codenameone-tools
          key: ${{ runner.os }}-cn1-tools-${{ hashFiles('scripts/setup-workspace.sh') }}
          restore-keys: |
            ${{ runner.os }}-cn1-tools-
      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-car-android-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-car-android-
            ${{ runner.os }}-m2-
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-car-${{ hashFiles('scripts/hellocodenameone/**/build.gradle*', 'Ports/Android/build.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-car-
            ${{ runner.os }}-gradle-
      - name: Setup workspace
        run: ./scripts/setup-workspace.sh -q -DskipTests
      - name: Build Android port
        run: ./scripts/build-android-port.sh -q -DskipTests
      - name: Build Hello Codename One Android app (car-enabled)
        id: build-android-app
        run: |
          mkdir -p ~/.codenameone
          cp maven/UpdateCodenameOne.jar ~/.codenameone/
          ./scripts/build-android-app.sh -q -DskipTests
      - name: Assert Android Auto wiring was injected
        run: |
          set -euo pipefail
          dir="${{ steps.build-android-app.outputs.gradle_project_dir }}"
          echo "Gradle project: $dir"
          grep -Rqs --include=AndroidManifest.xml "CN1CarAppService" "$dir" \
            || { echo "::error::CarAppService missing from AndroidManifest"; exit 1; }
          grep -Rqs --include='build.gradle*' "androidx.car.app:app" "$dir" \
            || { echo "::error::androidx.car.app dependency not injected"; exit 1; }
          find "$dir" -name 'CN1AndroidAutoBridge.java' | grep -q . \
            || { echo "::error::Android Auto bridge glue not copied into project"; exit 1; }
          echo "Android Auto wiring present."
      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run device suite on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          target: google_apis
          disk-size: 2048M
          script: ./scripts/run-android-instrumentation-tests.sh "${{ steps.build-android-app.outputs.gradle_project_dir }}"
      - name: Upload car screenshot + report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: car-android-artifacts
          path: |
            artifacts/*.png
            artifacts/android-test-report
            artifacts/connectedAndroidTest*.log
          if-no-files-found: warn
          retention-days: 14
