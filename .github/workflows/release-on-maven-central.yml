# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Release on Maven Central
on:
  push:
    tags: '*'
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Set up Git Config
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions@codenameone.com"

      - name: Check Maven Version
        run: mvn -v

      - name: Deploy Maven artifacts (core + archetypes)
        id: deploy
        continue-on-error: true
        run: |
          cat $HOME/.m2/settings.xml
          cd maven
          bash update-version.sh "$GITHUB_REF_NAME"
          export GPG_TTY=$(tty)
          # The cn1{app,lib}-archetype modules are part of the main reactor
          # since the in-tree migration, so a single mvn deploy publishes
          # everything (core + maven plugin + both archetypes).
          # -Darchetype.test.skip=true: the archetypes' ITs generate a
          # project pinned to the current cn1Version and invoke the
          # codenameone-maven-plugin against it; that plugin is being
          # published in this same reactor so it's not yet on Central
          # when the ITs run. -DskipTests covers the matching surefire pass.
          xvfb-run -a mvn deploy -Psign-artifacts -Dgpg.passphrase=$MAVEN_GPG_PASSPHRASE -Plocal-dev-javase -Darchetype.test.skip=true -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Confirm artifacts on Maven Central (only after deploy failure)
        id: confirm
        if: steps.deploy.outcome == 'failure'
        continue-on-error: true
        run: |
          # central-publishing-maven-plugin occasionally reports
          # "Deployment failed while publishing" even when the bundle was
          # actually accepted and published. As a safety net for that
          # false-positive case, poll Maven Central for the key artifacts:
          # the codenameone-maven-plugin (proxy for the core release) plus
          # both archetypes. Skipped when the deploy already reported
          # success (the artifact may still be propagating from Sonatype
          # Central to repo1; that propagation can take 30+ minutes and
          # isn't worth blocking on).
          set +e
          for i in $(seq 1 90); do
            plugin_code=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://repo1.maven.org/maven2/com/codenameone/codenameone-maven-plugin/${GITHUB_REF_NAME}/codenameone-maven-plugin-${GITHUB_REF_NAME}.pom")
            app_code=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://repo1.maven.org/maven2/com/codenameone/cn1app-archetype/${GITHUB_REF_NAME}/cn1app-archetype-${GITHUB_REF_NAME}.pom")
            lib_code=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://repo1.maven.org/maven2/com/codenameone/cn1lib-archetype/${GITHUB_REF_NAME}/cn1lib-archetype-${GITHUB_REF_NAME}.pom")
            if [ "$plugin_code" = "200" ] && [ "$app_code" = "200" ] && [ "$lib_code" = "200" ]; then
              echo "Confirmed codenameone-maven-plugin + cn1{app,lib}-archetype ${GITHUB_REF_NAME} on Maven Central"
              exit 0
            fi
            echo "[$i/90] Waiting on Maven Central (plugin=$plugin_code, cn1app=$app_code, cn1lib=$lib_code)"
            sleep 20
          done
          echo "Artifacts ${GITHUB_REF_NAME} did not appear on Maven Central within 30 minutes"
          exit 1

      - name: Fail when release did not complete
        if: steps.deploy.outcome != 'success' && steps.confirm.outcome != 'success'
        run: |
          echo "Release failed: deploy reported failure and the artifacts never appeared on Maven Central."
          exit 1

      # --- Game Builder editor -------------------------------------------------
      # The cn1:gamebuilder goal resolves
      # com.codenameone:codenameone-gamebuilder:<version>:jar-with-dependencies
      # from Maven Central. That editor lives outside the maven/ reactor
      # (scripts/gamebuilder), compiles at Java 17, and depends on the
      # core/javase/plugin published above, so it is built and deployed in a
      # second pass here. These steps run only when the core release succeeded;
      # update-version.sh already synced the gamebuilder poms to GITHUB_REF_NAME.
      - name: Set up JDK 17 for the Game Builder editor
        if: steps.deploy.outcome == 'success' || steps.confirm.outcome == 'success'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy Game Builder editor to Maven Central
        if: steps.deploy.outcome == 'success' || steps.confirm.outcome == 'success'
        run: |
          export GPG_TTY=$(tty)
          cd scripts/gamebuilder
          # The core/javase/plugin just released are already in the local repo
          # from the deploy above (install runs before the Central upload).
          # -Dcn1.version/-Dcn1.plugin.version pin the build to that version.
          # -Dmaven.test.skip=true also skips test *compilation* (the editor's
          # JUnit test deps are irrelevant to the published jar). -Pgamebuilder-
          # central adds the sources/javadoc jars, GPG signatures and the
          # central-publishing bundle; -Pexecutable-jar builds the fat jar.
          # -Dcodename1.platform=javase is REQUIRED: it activates the parent's
          # `javase` profile (which contributes the editor module) by property.
          # That profile is activeByDefault, but any explicit -P activation
          # suppresses activeByDefault, so without this property the editor
          # (codenameone-gamebuilder) silently drops out of the reactor and only
          # the parent + common modules would be published.
          xvfb-run -a mvn -Pexecutable-jar -Pgamebuilder-central deploy \
            -Dcodename1.platform=javase \
            -Dgpg.passphrase=$MAVEN_GPG_PASSPHRASE \
            -Dcn1.version=$GITHUB_REF_NAME -Dcn1.plugin.version=$GITHUB_REF_NAME \
            -Dmaven.test.skip=true
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Confirm Game Builder editor on Maven Central
        if: steps.deploy.outcome == 'success' || steps.confirm.outcome == 'success'
        continue-on-error: true
        run: |
          # Informational only: the editor bundle was accepted by Sonatype
          # Central in the step above (which would have failed otherwise).
          # Propagation to repo1 can take 30+ minutes, so this is a best-effort
          # sanity poll, not a gate.
          set +e
          url="https://repo1.maven.org/maven2/com/codenameone/codenameone-gamebuilder/${GITHUB_REF_NAME}/codenameone-gamebuilder-${GITHUB_REF_NAME}-jar-with-dependencies.jar"
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" = "200" ]; then
              echo "Confirmed codenameone-gamebuilder ${GITHUB_REF_NAME} (jar-with-dependencies) on Maven Central"
              exit 0
            fi
            echo "[$i/15] Waiting on Maven Central for codenameone-gamebuilder (code=$code)"
            sleep 20
          done
          echo "codenameone-gamebuilder ${GITHUB_REF_NAME} not visible on repo1 yet; it may still be propagating from Sonatype Central."
