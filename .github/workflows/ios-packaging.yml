name: Test iOS packaging

on:
  pull_request:
    paths:
      - '.github/workflows/ios-packaging.yml'
      - '.github/workflows/_build-ios-port.yml'
      - 'maven/codenameone-maven-plugin/**'
      - 'vm/ByteCodeTranslator/**'
      - 'Ports/iOSPort/**'
      - 'scripts/build-ios-app.sh'
      - 'scripts/run-ios-device-release-build.sh'
      - 'scripts/run-ios-ui-tests.sh'
      - 'scripts/run-ios-native-tests.sh'
      - 'scripts/ios/**'
      - 'scripts/hellocodenameone/**'
      - '!docs/**'
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/ios-packaging.yml'
      - '.github/workflows/_build-ios-port.yml'
      - 'maven/codenameone-maven-plugin/**'
      - 'vm/ByteCodeTranslator/**'
      - 'Ports/iOSPort/**'
      - 'scripts/build-ios-app.sh'
      - 'scripts/run-ios-device-release-build.sh'
      - 'scripts/run-ios-ui-tests.sh'
      - 'scripts/run-ios-native-tests.sh'
      - 'scripts/ios/**'
      - 'scripts/hellocodenameone/**'
      - '!docs/**'

concurrency:
  # Cancel superseded runs of this workflow for the same PR branch
  # (github.head_ref is set on pull_request events). On push to master
  # head_ref is empty, so the group falls back to the unique run_id and
  # every master commit is still tested in full -- no coverage lost.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-port:
    uses: ./.github/workflows/_build-ios-port.yml

  packaging:
    needs: build-port
    permissions:
      contents: read
    runs-on: macos-15
    # Headroom for the single native xcodebuild compile of the translated app, which grew with
    # the gaming runtime added to core and is slower on the Xcode 26.3 / iOS 26.2 toolchain.
    timeout-minutes: 120
    # Exercises both CocoaPods and SPM in a single Xcode project. Catches
    # regressions in either dependency manager (each pathway runs end to end)
    # and additionally validates that they coexist correctly. Also turns on
    # Google sign-in so GoogleConnectImpl.m is compiled under Xcode -- catches
    # signature drift between hand-written iOS port .m files and the
    # ParparVM-generated `set_field_*` headers, which is otherwise invisible
    # until a customer enables Google sign-in.
    env:
      IOS_DEPENDENCY_ARGS: >-
        -Dcodename1.arg.ios.dependencyManager=both
        -Dcodename1.arg.ios.pods=AFNetworking
        -Dcodename1.arg.ios.spm.packages=swift-collections|https://github.com/apple/swift-collections.git|from:1.1.0
        -Dcodename1.arg.ios.spm.products.swift-collections=Collections
        -Dcodename1.arg.ios.gplus.clientId=000000000000-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.apps.googleusercontent.com

    steps:
      - uses: actions/checkout@v6

      - name: Cache CocoaPods and user gems
        uses: actions/cache@v5
        with:
          path: |
            ~/.gem
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: ${{ runner.os }}-pods-v1-${{ hashFiles('scripts/setup-workspace.sh') }}
          restore-keys: |
            ${{ runner.os }}-pods-v1-

      - name: Ensure CocoaPods tooling
        run: |
          mkdir -p ~/.codenameone
          cp maven/UpdateCodenameOne.jar ~/.codenameone/
          set -euo pipefail
          GEM_USER_DIR="$(ruby -e 'print Gem.user_dir')"
          export PATH="$GEM_USER_DIR/bin:$PATH"
          if ! command -v pod >/dev/null 2>&1; then
            gem install cocoapods xcodeproj --no-document --user-install
          fi
          pod --version

      - name: Compute setup-workspace hash
        id: setup_hash
        run: |
          set -euo pipefail
          echo "hash=$(shasum -a 256 scripts/setup-workspace.sh | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Compute CN1 source hash
        id: src_hash
        run: |
          set -euo pipefail
          SRC_HASH=$(find CodenameOne/src Ports/iOSPort vm/JavaAPI vm/ByteCodeTranslator Themes native-themes \
              maven/codenameone-maven-plugin/src/main \
              -type f \( -name '*.java' -o -name '*.m' -o -name '*.h' -o -name '*.xml' -o -name '*.properties' -o -name '*.css' \) 2>/dev/null \
              | sort | xargs shasum -a 256 | shasum -a 256 | awk '{print $1}')
          POM_HASH=$(find . -name 'pom.xml' -not -path './scripts/*' 2>/dev/null \
              | sort | xargs shasum -a 256 | shasum -a 256 | awk '{print $1}')
          SCRIPT_HASH=$(shasum -a 256 \
              scripts/setup-workspace.sh \
              scripts/build-ios-port.sh \
              scripts/build-native-themes.sh \
              .github/workflows/_build-ios-port.yml \
              | shasum -a 256 | awk '{print $1}')
          echo "hash=${SRC_HASH:0:16}-${POM_HASH:0:16}-${SCRIPT_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Set TMPDIR
        run: echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV

      - name: Cache codenameone-tools
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/codenameone-tools
          key: ${{ runner.os }}-cn1-tools-${{ steps.setup_hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-cn1-tools-

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Restore cn1-binaries cache
        uses: actions/cache@v5
        with:
          path: ../cn1-binaries
          key: cn1-binaries-${{ runner.os }}-${{ steps.setup_hash.outputs.hash }}
          restore-keys: |
            cn1-binaries-${{ runner.os }}-

      - name: Download built CN1 + iOS port bundle
        uses: actions/download-artifact@v4
        with:
          name: cn1-built-bundle
          path: ${{ runner.temp }}
      - name: Restore built CN1 + iOS port tree
        run: |
          set -euo pipefail
          # Replaces the evictable cn1-built cache restore with the artifact
          # build-port handed off (not LRU-evicted, survives --failed re-runs).
          tar -C / -xf "$RUNNER_TEMP/cn1-built-bundle.tar"

      - name: Build sample iOS app
        id: build_ios_app
        run: ./scripts/build-ios-app.sh -q -DskipTests
        timeout-minutes: 30

      - name: Cache iOS device release derived data
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/cn1-ios-device-release-derived
          key: ${{ runner.os }}-ios-device-release-derived-${{ steps.src_hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-ios-device-release-derived-

      - name: Build Release iOS device app without signing
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts/ios-device-release
          CN1_IOS_DEVICE_DERIVED_DATA: ${{ runner.temp }}/cn1-ios-device-release-derived
        run: |
          set -euo pipefail
          mkdir -p "${ARTIFACTS_DIR}"
          ./scripts/run-ios-device-release-build.sh \
            "${{ steps.build_ios_app.outputs.workspace }}" \
            "${{ steps.build_ios_app.outputs.scheme }}"
        timeout-minutes: 45

      - name: Cache iOS derived data
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/cn1-ios-derived
          # Keyed on the CN1 source hash so a re-run of the same commit (and any unchanged-source
          # run) restores the compiled objects and builds incrementally; a source change misses
          # and does a full (headroom-covered) build.
          key: ${{ runner.os }}-ios-derived-${{ steps.src_hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-ios-derived-

      - name: Run iOS UI smoke
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts/ios-packaging
          # The packaging smoke only needs the app to build, launch and screenshot -- it is not
          # the SIMD benchmark, so compile the translated C at -O1 instead of the default -O2.
          # That roughly halves the native compile time (the step's dominant cost), keeping it
          # within budget after the gaming runtime enlarged core. The benchmark/metal pipeline
          # keeps the -O2 default.
          CN1_TEST_OPT_LEVEL: "1"
          # Shared, cached derived-data dir: the native-test step reuses these compiled objects,
          # and a re-run restores them, instead of recompiling the whole translated core.
          CN1_IOS_DERIVED_DATA: ${{ runner.temp }}/cn1-ios-derived
        run: |
          set -euo pipefail
          mkdir -p "${ARTIFACTS_DIR}"
          ./scripts/run-ios-ui-tests.sh \
            "${{ steps.build_ios_app.outputs.workspace }}" \
            "" \
            "${{ steps.build_ios_app.outputs.scheme }}"
        # run-ios-ui-tests.sh has a 12-minute no-progress watchdog and a
        # bounded 35-minute suite cap; include native build/cleanup headroom.
        timeout-minutes: 65

      - name: Run native iOS notification tests
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts/ios-packaging-native
          # Reuse the app + core already compiled by the UI-smoke step (same shared derived data)
          # so this test build does not recompile the whole translated core a second time.
          CN1_IOS_DERIVED_DATA: ${{ runner.temp }}/cn1-ios-derived
          CN1_TEST_OPT_LEVEL: "1"
        run: |
          set -euo pipefail
          mkdir -p "${ARTIFACTS_DIR}"
          ./scripts/run-ios-native-tests.sh \
            "${{ steps.build_ios_app.outputs.workspace }}" \
            "${{ steps.build_ios_app.outputs.scheme }}"
        timeout-minutes: 20

      - name: Upload packaging artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-packaging
          path: artifacts
          if-no-files-found: warn
          retention-days: 14
