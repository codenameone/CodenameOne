# Native dependencies for cn1-applovin (AppLovin MAX), applied automatically
# when this library is on the project classpath.
#
# AppLovin identifies the app by an SDK key (not a per-ad-unit app id). It
# differs per app, so set it in your project's codenameone_settings.properties
# with the standard build hints:
#   codename1.arg.android.xapplication=<meta-data android:name="applovin.sdk.key" android:value="YOUR_SDK_KEY"/>
#   codename1.arg.ios.plistInject=<key>AppLovinSdkKey</key><string>YOUR_SDK_KEY</string>
#
# iOS: AppLovin MAX SDK.
codename1.arg.ios.pods=AppLovinSDK
# Android: AppLovin MAX SDK.
codename1.arg.android.gradleDep=implementation 'com.applovin:applovin-sdk:13.0.1'
# Android: ad serving requires network access.
codename1.arg.android.xpermissions=<uses-permission android:name="android.permission.INTERNET" />
