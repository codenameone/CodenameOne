# On-device debugging for iOS apps. When set, the iOS build emits a
# JDWP-compatible debug agent that dials out to a proxy on your laptop
# so any IDE that speaks JDWP (IntelliJ, jdb, VS Code) can attach to
# the running app on the native iOS simulator or a tethered device.
# See the "On-Device Debugging (iOS)" chapter of the developer guide
# for the full setup (the IntelliJ Run/Debug configs that come with
# this project's .idea/ directory are wired against these hints).
#codename1.arg.ios.onDeviceDebug=true
#codename1.arg.ios.onDeviceDebug.proxyHost=127.0.0.1
#codename1.arg.ios.onDeviceDebug.proxyPort=55333
# Block the app at boot until the debugger attaches (default: false).
#codename1.arg.ios.onDeviceDebug.waitForAttach=true
# On-device debugging for Android apps. When set, the Android build
# marks the APK debuggable and skips R8/proguard so the Dalvik/ART
# JDWP socket is reachable through adb. Pair with the IntelliJ
# "CN1 Android On-Device Debug" and "CN1 Attach Android" run configs
# bundled with this project, or with the cn1:android-on-device-debugging
# Maven goal. See the "On-Device Debugging (Android)" chapter of the
# developer guide for the wireless-debugging instructions and the full
# adb flow.
#codename1.arg.android.onDeviceDebug=true
