# Native dependencies for cn1-unity-levelplay (Unity LevelPlay / ironSource),
# applied automatically when this library is on the project classpath.
#
# LevelPlay identifies the app by an app key. It differs per app, so set it in
# your project's codenameone_settings.properties with the standard build hints:
#   codename1.arg.android.xapplication=<meta-data android:name="levelplay.app.key" android:value="YOUR_APP_KEY"/>
#   codename1.arg.ios.plistInject=<key>LevelPlayAppKey</key><string>YOUR_APP_KEY</string>
#
# iOS: Unity LevelPlay (ironSource) SDK.
codename1.arg.ios.pods=IronSourceSDK
# Android: Unity LevelPlay mediation SDK.
codename1.arg.android.gradleDep=implementation 'com.unity3d.ads-mediation:mediation-sdk:8.4.0'
# Android: ad serving requires network access.
codename1.arg.android.xpermissions=<uses-permission android:name="android.permission.INTERNET" />
