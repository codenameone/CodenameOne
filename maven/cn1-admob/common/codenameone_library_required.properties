# Native dependencies for cn1-admob, applied automatically when this library is
# on the project classpath.
#
# The per-app AdMob application id is NOT set here (it differs per app). Add it
# to your project's codenameone_settings.properties using the standard build
# hints, e.g.:
#   codename1.arg.android.xapplication=<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-XXXXXXXX~YYYYYYYY"/>
#   codename1.arg.ios.plistInject=<key>GADApplicationIdentifier</key><string>ca-app-pub-XXXXXXXX~YYYYYYYY</string>
#
# iOS: Google Mobile Ads SDK (bundles the User Messaging Platform for consent).
codename1.arg.ios.pods=Google-Mobile-Ads-SDK
# Android: Google Mobile Ads SDK + User Messaging Platform (UMP) for GDPR consent.
codename1.arg.android.gradleDep=implementation 'com.google.android.gms:play-services-ads:24.0.0'\n    implementation 'com.google.android.ump:user-messaging-platform:3.1.0'
# Android: ad serving requires network access.
codename1.arg.android.xpermissions=<uses-permission android:name="android.permission.INTERNET" />
