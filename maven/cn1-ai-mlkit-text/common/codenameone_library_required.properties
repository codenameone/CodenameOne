# Auto-installed build hints for cn1-ai-mlkit-text.
# Loaded by the Codename One build server when this cn1lib is in the
# project classpath. The build-time AiDependencyTable scanner adds
# further per-class entries as needed.
codename1.arg.ios.pods=GoogleMLKit/TextRecognition
codename1.arg.android.gradleDep=implementation 'com.google.mlkit:text-recognition:16.0.0'
codename1.arg.ios.plistInject=<key>NSCameraUsageDescription</key><string>This app uses the camera to recognise text.</string>
