<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Codename One JavaScript Port</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Indeterminate progress bar shown until HTML5Implementation.hideSplash
     runs and the host-bridge ``__cn1_hide_splash__`` handler removes
     #cn1-splash. Pure CSS so it animates regardless of whether the worker
     is still downloading translated_app.js or busy initialising the
     framework -- both phases sit on the splash and the old static
     "Loading..." left users wondering whether the page had hung. */
  #cn1-splash .cn1-progress {
    width: 16em;
    max-width: 60vw;
    height: 6px;
    border-radius: 3px;
    background: #eee;
    overflow: hidden;
    margin: 1em auto 0.6em;
  }
  #cn1-splash .cn1-progress-bar {
    width: 33%;
    height: 100%;
    background: linear-gradient(90deg, #0072ff, #00c6ff);
    border-radius: 3px;
    animation: cn1-progress-slide 1.4s ease-in-out infinite;
  }
  @keyframes cn1-progress-slide {
    0%   { transform: translateX(-110%); }
    100% { transform: translateX(310%); }
  }
</style>
</head>
<body>
<div id="cn1-splash">
  <div class="cn1-progress" role="progressbar" aria-label="Loading application">
    <div class="cn1-progress-bar"></div>
  </div>
  <p>Loading&#8230;</p>
</div>
<canvas id="codenameone-canvas" width="320" height="480"></canvas>
<script>
window.cn1LoadedFiles = window.cn1LoadedFiles || [];
window.cn1LoadedFile = window.cn1LoadedFile || function(filename) {
  window.cn1LoadedFiles.push(String(filename || ""));
};
</script>
<script src="js/push.js"></script>
<script src="js/jquery.min.js"></script>
<script src="js/fontmetrics.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/localforage-shim.js"></script>
<!-- Native-interface implementations run on the MAIN thread (DOM access). They
     register into cn1_native_interfaces (defined by fontmetrics.js above) before
     browser_bridge.js wires the worker, so host-call dispatch can find them. -->
<!--__NATIVE_INTERFACE_STUBS__-->
<script src="browser_bridge.js"></script>
</body>
</html>
